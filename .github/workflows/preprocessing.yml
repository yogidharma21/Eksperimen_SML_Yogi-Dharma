name: Automated Preprocessing — Credit Card Fraud

on:
  push:
    paths:
      - "credit_card_fraud_dataset_raw.csv"
      - "preprocessing/automate_Yogi-Dharma.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  preprocess:
    name: Run Preprocessing Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn

      - name: Run Automate Preprocessing
        run: |
          python preprocessing/automate_Yogi-Dharma.py

      - name: Upload Preprocessed Dataset as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: credit_card_fraud_preprocessed
          path: preprocessing/credit_card_fraud_dataset_preprocessing/credit_card_fraud_preprocessing.csv
          retention-days: 30

      - name: Commit Preprocessed Dataset to Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add preprocessing/credit_card_fraud_dataset_preprocessing/
          git diff --cached --quiet || git commit -m "chore: update preprocessed dataset [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
